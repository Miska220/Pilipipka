<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Сюрприз для тебя ✨</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #1b1b2f, #0f0f1a);
      color: white;
      overflow: hidden;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
    }

    h1 {
      font-size: 3em;
      margin-bottom: 10px;
      animation: glow 2s infinite alternate;
    }

    p {
      font-size: 1.2em;
      opacity: 0.8;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px #00f7ff; }
      to { text-shadow: 0 0 25px #ff00e6; }
    }

    .btn {
      margin-top: 20px;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(45deg, #ff00e6, #00f7ff);
      color: white;
      cursor: pointer;
      font-size: 16px;
      transition: transform 0.2s;
    }

    .btn:hover {
      transform: scale(1.1);
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      z-index: -1;
    }
  </style>
</head>
<body>

  <h1>Привет 👋</h1>
  <p>Ты нашёл секретную страницу GitHub 🎉</p>
  <button class="btn" onclick="showMessage()">Нажми меня</button>

  <canvas id="stars"></canvas>

  <script>
    function showMessage() {
      alert("Ты классный человек ✨ Продолжай кодить и создавать!");
    }

    const canvas = document.getElementById("stars");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let stars = Array.from({length: 150}, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 2,
      d: Math.random() * 1
    }));

    function drawStars() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "white";
      stars.forEach(s => {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      });
      moveStars();
    }

    function moveStars() {
      stars.forEach(s => {
        s.y += s.d;
        if (s.y > canvas.height) {
          s.y = 0;
          s.x = Math.random() * canvas.width;
        }
      });
    }

    setInterval(drawStars, 50);
  </script>

</body>
</html>
